version: "1"

dataset:
  id: "demo_report"
  prefix: "demo_prefix"

paths:
  reference_h5ad: "minimal_inputs/reference.h5ad"
  query_h5ad: "minimal_inputs/query.h5ad"
  ref_model_dir: "minimal_inputs/ref_model"
  identity_output_dir: "minimal_inputs/identity_outputs"
  cls_output_dir: "report_fixture/cls_output"
  report_output_dir: "report_fixture/generated"
  ref_sceniclike_h5ad: "minimal_inputs/ref_sceniclike.h5ad"
  regulons_json: "minimal_inputs/regulons.json"

runtime:
  seed: 0
  n_jobs: 1

identity:
  target_class: "RG"
  counts_layer: "counts"
  ref_label_key: "cell_subtype"
  max_epochs: 5
  plan_kwargs:
    weight_decay: 0.0
  early_stopping: false
  early_stopping_patience: 5
  ensemble_size: 2
  target_precision: 0.8
  std_quantile: 75.0
  u_min: 0.005
  entropy_threshold: 0.8
  inplace_subset_query_vars: true
  set_X_to_counts: true

cls:
  enabled_components: ["A", "B"]
  batch_key: "Sample"
  candidate_flag_prefix: "is_candidate_"
  ref_label_key: "cell_subtype"
  a: {}
  b: {}
  c: {}
  d: {}
  e: {}
  f: {}

report:
  summary_filename: "summary.csv"
  manifest_filename: "manifest.json"
  cls_weights:
    A: 1.0
    B: 1.0
