name: CI

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run CLI smoke checks
        run: |
          python -m bridge --help
          bridge identity run --config configs/bridge.minimal.yaml --dry-run
          bridge cls run --config configs/bridge.minimal.yaml --dry-run
          bridge report summarize --config configs/report-smoke.yaml --dry-run
