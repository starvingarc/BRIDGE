name: Feature request
description: Suggest an improvement to BRIDGE
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What limitation or need does this request address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What change would you like to see?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope considerations
      description: Does this affect Step 2, Step 3, config contracts, reporting, or packaging?
