version: "1"

dataset:
  id: "demo_dataset"
  prefix: "demo_prefix"

paths:
  reference_h5ad: "./path/to/reference.h5ad"
  query_h5ad: "./path/to/query.h5ad"
  ref_model_dir: "./path/to/ref_model"
  identity_output_dir: "./artifacts/identity"
  cls_output_dir: "./artifacts/cls"
  report_output_dir: "./artifacts/report"
  ref_sceniclike_h5ad: "./path/to/ref_sceniclike.h5ad"
  regulons_json: "./path/to/regulons.json"

runtime:
  seed: 0
  n_jobs: 1

identity:
  target_class: "RG"
  counts_layer: "counts"
  ref_label_key: "cell_subtype"
  max_epochs: 5
  plan_kwargs:
    weight_decay: 0.0
  early_stopping: false
  early_stopping_patience: 5
  ensemble_size: 2
  target_precision: 0.8
  std_quantile: 75.0
  u_min: 0.005
  entropy_threshold: 0.8
  inplace_subset_query_vars: true
  set_X_to_counts: true

cls:
  enabled_components: ["A"]
  batch_key: "Sample"
  candidate_flag_prefix: "is_candidate_"
  ref_label_key: "cell_subtype"
  a:
    min_cells_per_batch: 20
  b: {}
  c: {}
  d: {}
  e: {}
  f: {}

report:
  summary_filename: "summary.csv"
  manifest_filename: "manifest.json"
